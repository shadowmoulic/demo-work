<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Project Dashboard | POC</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111;
            --accent: #7c4dff;
            --text: #eee;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.4s;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0, 255, 128, 0.1);
            color: #00ff80;
            border: 1px solid rgba(0, 255, 128, 0.2);
        }

        .iframe-container {
            flex: 1;
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .overlay-btn {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(124, 77, 255, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .overlay-btn:hover {
            transform: scale(1.05);
            background: #8e62ff;
        }

        .background-blob {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        @media (max-width: 1000px) {
            .project-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
    <div class="container">
        <header>
            <h1>Project Hub</h1>
            <p class="subtitle">Unified development environment for your POC projects.</p>
        </header>

        <div class="project-grid">
            <!-- Project Scooters -->
            <div class="project-card">
                <div class="card-header">
                    <span class="card-title">Project Scooters</span>
                    <span class="status-badge">Live :5173</span>
                </div>
                <div class="iframe-container">
                    <iframe src="http://localhost:5173" title="Project Scooters"></iframe>
                    <a href="http://localhost:5173" target="_blank" class="overlay-btn">Open Solo</a>
                </div>
            </div>

            <!-- Ignite Global -->
            <div class="project-card">
                <div class="card-header">
                    <span class="card-title">Ignite Global</span>
                    <span class="status-badge">Live :5174</span>
                </div>
                <div class="iframe-container">
                    <iframe src="http://localhost:5174/POC/ignite-global/" title="Ignite Global"></iframe>
                    <a href="http://localhost:5174/POC/ignite-global/" target="_blank" class="overlay-btn">Open Solo</a>
                </div>
            </div>

            <!-- Greatest Luxury -->
            <div class="project-card">
                <div class="card-header">
                    <span class="card-title">Greatest Luxury</span>
                    <span class="status-badge">Live :5175</span>
                </div>
                <div class="iframe-container">
                    <iframe src="http://localhost:5175/POC/greatest-luxury/" title="Greatest Luxury"></iframe>
                    <a href="http://localhost:5175/POC/greatest-luxury/" target="_blank" class="overlay-btn">Open Solo</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
